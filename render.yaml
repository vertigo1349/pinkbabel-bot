services:
  - type: web
    name: pinkbabel-bot
    runtime: python
    plan: free
    buildCommand: python -m pip install .
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 mi_bot.webhook:flask_app
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: BOT_NAME
        value: PinkBabel
      - key: TARGET_LANG
        value: es
      - key: BOT_DATA_FILE
        value: /tmp/pinkbabel/bot_data.json
      - key: WEBHOOK_URL
        value: https://pinkbabel-bot.onrender.com
      - key: WEBHOOK_PATH
        value: telegram
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.11
